<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:,">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Trump vs Biden</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    canvas { display: block; }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.8);
      z-index: 20;
      color: #fff;
      padding: 20px;
      padding-top: max(20px, 8vh); /* Safe zone: Play.fun widget bar is ~75px at top */
    }
    .overlay.hidden { display: none; }

    .overlay h1 {
      font-size: clamp(28px, 7vmin, 56px);
      margin-bottom: clamp(10px, 2vmin, 24px);
      text-align: center;
      color: #ff4444;
      text-shadow: 0 0 20px rgba(255,68,68,0.5);
    }
    .overlay p {
      font-size: clamp(14px, 2.5vmin, 22px);
      margin-bottom: 8px;
      color: #aaa;
      text-align: center;
    }
    .overlay .score-display {
      font-size: clamp(22px, 5vmin, 40px);
      margin: 12px 0 4px;
      font-weight: bold;
    }
    .overlay .best-display {
      font-size: clamp(14px, 2.5vmin, 22px);
      color: #aaa;
      margin-bottom: 4px;
    }
    .overlay button {
      margin-top: clamp(20px, 4vmin, 36px);
      padding: clamp(12px, 2.5vmin, 18px) clamp(32px, 7vmin, 56px);
      font-size: clamp(16px, 2.5vmin, 22px);
      font-family: inherit;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #ff4444, #cc2222);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      min-height: 44px;
      min-width: 120px;
      transition: background 0.2s, transform 0.1s;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .overlay button:hover { background: linear-gradient(135deg, #ff6666, #dd3333); transform: scale(1.05); }
    .overlay button:active { background: linear-gradient(135deg, #cc2222, #aa1111); transform: scale(0.95); }
    .overlay .hint {
      font-size: clamp(11px, 2vmin, 16px);
      color: #666;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div id="gameover-overlay" class="overlay hidden">
    <h1>GAME OVER</h1>
    <div class="score-display" id="final-score">Score: 0</div>
    <div class="best-display" id="best-score">Best: 0</div>
    <button id="restart-btn">PLAY AGAIN</button>
    <p class="hint">Press Space or Enter to restart</p>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
