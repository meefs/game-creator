<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:,">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Crowd Dash</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050510; overflow: hidden; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    canvas { display: block; }

    /* Score HUD omitted -- Play.fun widget displays score in a deadzone at the top */

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(5, 5, 16, 0.85);
      z-index: 20;
      color: #fff;
      padding: 20px;
      padding-top: max(20px, 8vh); /* Safe zone: Play.fun widget bar is ~75px at top */
    }
    .overlay.hidden { display: none; }

    .overlay h1 {
      font-size: clamp(28px, 7vmin, 56px);
      margin-bottom: clamp(10px, 2vmin, 24px);
      text-align: center;
      color: #ff1493;
      text-shadow: 0 0 20px #ff1493, 0 0 40px #ff149388;
    }
    .overlay p {
      font-size: clamp(14px, 2.5vmin, 22px);
      margin-bottom: 8px;
      color: #aaa;
      text-align: center;
    }
    .overlay .score-display {
      font-size: clamp(18px, 4vmin, 32px);
      margin: 8px 0;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff88;
    }
    .overlay .best-display {
      font-size: clamp(14px, 2.5vmin, 22px);
      color: #7b2ff7;
      text-shadow: 0 0 8px #7b2ff788;
    }
    .overlay button {
      margin-top: clamp(16px, 3vmin, 32px);
      padding: clamp(10px, 2vmin, 16px) clamp(28px, 6vmin, 48px);
      font-size: clamp(16px, 2.5vmin, 22px);
      font-family: inherit;
      font-weight: bold;
      color: #fff;
      background: #7b2ff7;
      border: 2px solid #ff1493;
      border-radius: 8px;
      cursor: pointer;
      min-height: 44px;
      min-width: 120px;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 0 15px #ff149366, 0 0 30px #7b2ff744;
    }
    .overlay button:hover {
      background: #9b4fff;
      transform: scale(1.05);
      box-shadow: 0 0 20px #ff149388, 0 0 40px #7b2ff766;
    }
    .overlay button:active { background: #6a22d5; transform: scale(0.95); }

    /* Virtual joystick (mobile only, created by InputSystem) */
    #joystick-zone {
      position: fixed;
      bottom: max(20px, 3vh);
      left: max(20px, 3vw);
      width: clamp(100px, 20vmin, 140px);
      height: clamp(100px, 20vmin, 140px);
      z-index: 15;
      display: none;
      touch-action: none;
    }
    #joystick-base {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(0, 255, 255, 0.3);
      position: relative;
    }
    #joystick-thumb {
      width: 40%;
      height: 40%;
      border-radius: 50%;
      background: rgba(0, 255, 255, 0.4);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="gameover-overlay" class="overlay hidden">
    <h1>GAME OVER</h1>
    <div class="score-display" id="final-score">Score: 0</div>
    <div class="best-display" id="best-score">Best: 0</div>
    <button id="restart-btn">DASH AGAIN</button>
  </div>

  <div id="joystick-zone">
    <div id="joystick-base">
      <div id="joystick-thumb"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
